services:
  postgres:
    image: postgres:16
    container_name: diabeet_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: diabeet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
